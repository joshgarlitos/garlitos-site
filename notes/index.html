<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - Josh Garlitos</title>
    <meta name="description" content="A collection of living notes on product management, AI, hardware, and building products at scale. Curated topics organized by tags.">
    <meta name="keywords" content="product management, AI, hardware, healthcare, machine learning, operations, scaling">
    <meta name="author" content="Josh Garlitos">
    <link rel="canonical" href="https://www.garlitos.com/notes/">

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        line-height: 1.6;
        color: #1a1a1a;
        background-color: #ffffff;
        padding: 2rem 1.5rem;
      }

      .container {
        max-width: 48rem;
        margin: 0 auto;
      }

      header {
        margin-bottom: 3rem;
      }

      .breadcrumbs {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        margin-bottom: 1.5rem;
        color: #666;
      }

      .breadcrumbs a {
        color: #666;
        text-decoration: none;
        transition: color 0.2s;
      }

      .breadcrumbs a:hover {
        color: #0066cc;
      }

      .breadcrumbs .separator {
        color: #ccc;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }

      .topics-list {
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }

      .topic-card {
        border-bottom: 1px solid #e5e5e5;
        padding-bottom: 2rem;
      }

      .topic-card:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }

      .topic-card h2 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }

      .topic-card h2 a {
        color: #1a1a1a;
        text-decoration: none;
        transition: color 0.2s;
      }

      .topic-card h2 a:hover {
        color: #0066cc;
      }

      .topic-meta {
        font-size: 0.875rem;
        color: #666;
        margin-bottom: 0.75rem;
      }

      .topic-description {
        color: #1a1a1a;
        margin-bottom: 0.75rem;
        line-height: 1.7;
      }

      .topic-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .tag {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        background-color: #f5f5f5;
        color: #666;
        font-size: 0.75rem;
        border-radius: 12px;
        text-decoration: none;
        transition: background-color 0.2s;
      }

      .tag:hover {
        background-color: #e5e5e5;
      }

      footer {
        margin-top: 4rem;
        padding-top: 2rem;
        border-top: 1px solid #e5e5e5;
        text-align: center;
        color: #666;
        font-size: 0.875rem;
      }

      @media (min-width: 768px) {
        body {
          padding: 4rem 1.5rem;
        }

        h1 {
          font-size: 3rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header>
        <nav class="breadcrumbs">
          <a href="/">Home</a>
          <span class="separator">/</span>
          <span>Notes</span>
        </nav>
        <h1>Notes</h1>
      </header>

      <div class="topics-list"></div>

      <footer>
        <p>© 2025 Josh Garlitos</p>
      </footer>
    </div>
  </body>
</html>
